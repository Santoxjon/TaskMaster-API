openapi: 3.0.3
info:
  title: TaskMaster API
  version: 1.0.0
  description: API RESTful para gestión de proyectos y tareas

servers:
  - url: http://localhost:3000

tags:
  - name: Projects
    description: Gestión de proyectos
  - name: Tasks
    description: Gestión de tareas

paths:
  /api/v1/projects:
    get:
      tags: [Projects]
      summary: Listar todos los proyectos
      responses:
        '200':
          description: Lista de proyectos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
              example:
                - id: "314d8d5b-8480-45cb-b057-093681407aac"
                  name: "Web App Redesign"
                  description: "Rediseño completo de la aplicación web con nueva interfaz moderna"
                - id: "a1b2c3d4-e5f6-47g8-h9i0-j1k2l3m4n5o6"
                  name: "Mobile App Development"
                  description: "Desarrollo de aplicación móvil nativa para iOS y Android"
              example:
                - id: "314d8d5b-8480-45cb-b057-093681407aac"
                  name: "Web App Redesign"
                  description: "Rediseño completo de la aplicación web con nueva interfaz moderna"
                - id: "a1b2c3d4-e5f6-47g8-h9i0-j1k2l3m4n5o6"
                  name: "Mobile App Development"
                  description: "Desarrollo de aplicación móvil nativa para iOS y Android"
        '204':
          description: No hay proyectos
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Projects]
      summary: Crear un nuevo proyecto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
            example:
              name: "Dashboard Analytics"
              description: "Crear un dashboard interactivo para análisis de datos en tiempo real"
      responses:
        '201':
          description: Proyecto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: "b3c4d5e6-f7g8-49h0-i1j2-k3l4m5n6o7p8"
                name: "Dashboard Analytics"
                description: "Crear un dashboard interactivo para análisis de datos en tiempo real"
              example:
                id: "b3c4d5e6-f7g8-49h0-i1j2-k3l4m5n6o7p8"
                name: "Dashboard Analytics"
                description: "Crear un dashboard interactivo para análisis de datos en tiempo real"
        '400':
          description: Campos obligatorios faltantes (name, description)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Datos inválidos o mal formados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Obtener un proyecto por ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proyecto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: "314d8d5b-8480-45cb-b057-093681407aac"
                name: "Web App Redesign"
                description: "Rediseño completo de la aplicación web con nueva interfaz moderna"
        '400':
          description: Parámetro projectId inválido o vacío
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Projects]
      summary: Actualizar un proyecto
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
            example:
              name: "Web App Redesign v2"
              description: "Rediseño de la aplicación web con nuevas características y mejorado rendimiento"
      responses:
        '200':
          description: Proyecto actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: "314d8d5b-8480-45cb-b057-093681407aac"
                name: "Web App Redesign v2"
                description: "Rediseño de la aplicación web con nuevas características y mejorado rendimiento"
        '400':
          description: Campos obligatorios faltantes o parámetro projectId inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Datos inválidos o mal formados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Projects]
      summary: Eliminar un proyecto
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Proyecto eliminado
        '400':
          description: Parámetro projectId inválido o vacío
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects/{projectId}/tasks:
    get:
      tags: [Tasks]
      summary: Listar tareas de un proyecto (con filtro opcional por estado)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED]
      responses:
        '200':
          description: Lista de tareas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '204':
          description: No hay tareas
        '400':
          description: Parámetro projectId inválido o parámetro status no válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Tasks]
      summary: Crear tarea asociada a un proyecto
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Tarea creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Campos obligatorios faltantes o parámetro projectId inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Datos inválidos o mal formados (fecha inválida, estado inválido)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/status:
    patch:
      tags: [Tasks]
      summary: Actualizar el estado de una tarea
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PENDING, IN_PROGRESS, COMPLETED]
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Campo status faltante o parámetro taskId inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Tarea no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Estado no válido (debe ser PENDING, IN_PROGRESS o COMPLETED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects/{projectId}/tasks/stats:
    get:
      tags: [Tasks]
      summary: Estadísticas de tareas por estado en un proyecto
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conteo de tareas por estado
          content:
            application/json:
              schema:
                type: object
                properties:
                  PENDING:
                    type: integer
                  IN_PROGRESS:
                    type: integer
                  COMPLETED:
                    type: integer
        '400':
          description: Parámetro projectId inválido o vacío
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Mensaje de error descriptivo
          example: "Faltan campos obligatorios: name, description"
        code:
          type: string
          description: Código de error interno
          example: "MISSING_FIELDS"
        timestamp:
          type: string
          format: date-time
          description: Timestamp del error
          example: "2026-03-02T12:30:45.123Z"
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del proyecto
          example: "314d8d5b-8480-45cb-b057-093681407aac"
        name:
          type: string
          description: Nombre del proyecto
          example: "Web App Redesign"
        description:
          type: string
          description: Descripción del proyecto
          example: "Rediseño completo de la aplicación web con nueva interfaz moderna"
    ProjectInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          description: Nombre del proyecto
          example: "Mobile App Development"
        description:
          type: string
          description: Descripción del proyecto
          example: "Desarrollo de aplicación móvil nativa para iOS y Android"
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la tarea
          example: "a1b2c3d4-e5f6-47g8-h9i0-j1k2l3m4n5o6"
        projectId:
          type: string
          format: uuid
          description: ID del proyecto al que pertenece la tarea
          example: "314d8d5b-8480-45cb-b057-093681407aac"
        title:
          type: string
          description: Título de la tarea
          example: "Diseñar mockups de interfaz"
        description:
          type: string
          description: Descripción detallada de la tarea
          example: "Crear mockups de alta fidelidad para las pantallas principales de la aplicación"
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED]
          description: Estado actual de la tarea
          example: "IN_PROGRESS"
        dueDate:
          type: string
          format: date
          description: Fecha de vencimiento en formato YYYY-MM-DD
          example: "2026-03-15"
    TaskInput:
      type: object
      required: [title, description, status, dueDate]
      properties:
        title:
          type: string
          description: Título de la tarea
          example: "Implementar autenticación"
        description:
          type: string
          description: Descripción detallada de la tarea
          example: "Implementar sistema de autenticación con OAuth2 y JWT"
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED]
          description: Estado inicial de la tarea
          example: "PENDING"
        dueDate:
          type: string
          format: date
          description: Fecha de vencimiento en formato YYYY-MM-DD
          example: "2026-03-20"
